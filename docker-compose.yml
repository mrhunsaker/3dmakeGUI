# Docker Compose file for 3dmake-gui-wrapper
# Usage:
#   docker compose up --build        # build image and start
#   docker compose up -d             # start in background (requires prior build)
#   docker compose down              # stop and remove containers
#
# The NiceGUI UI is served at http://localhost:8080
# Project files are persisted in the `projects` named volume.

services:
  3dmake-gui:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: 3dmake-gui-wrapper:2026.04.29
    container_name: 3dmake-gui
    restart: unless-stopped

    # Bind only to localhost to avoid unintended network exposure.
    # Change to "0.0.0.0:8080:8080" only if you have an authenticating
    # reverse proxy (e.g. nginx/traefik) in front.
    ports:
      - "127.0.0.1:8080:8080"

    environment:
      # NiceGUI configuration via environment variables
      - NICEGUI_HOST=0.0.0.0
      - NICEGUI_PORT=8080
      # Set to "1" to suppress the browser auto-open attempt
      - NICEGUI_RELOAD=false

    volumes:
      # Persist user settings and generated files across container restarts.
      # Mount your actual 3D-project directory here instead of a named volume
      # if you want to work on host files directly, e.g.:
      #   - /home/youruser/projects:/home/appuser/projects
      - projects:/home/appuser/projects
      - settings:/home/appuser/.config/3dmake-gui

    # Drop all Linux capabilities; add back only what is strictly required.
    cap_drop:
      - ALL

    # Read-only root filesystem; writable paths are mounted as volumes/tmpfs.
    read_only: true
    tmpfs:
      - /tmp
      - /run

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  projects:
  settings:
