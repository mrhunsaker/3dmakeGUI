site_name: 3DMake GUI Wrapper Documentation
site_description: Accessibility-focused NiceGUI wrapper for tdeck/3dmake
site_author: Michael Ryan Hunsaker, M.Ed., Ph.D.
site_url: https://mrhunsaker.github.io/3DMAKEGUI/
repo_url: https://github.com/mrhunsaker/3dmakeGUI
repo_name: mrhunsaker/3dmakeGUI
edit_uri: edit/main/docs/

theme:
  name: material
  logo: icon.png
  favicon: icon.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
            - scripts
          options:
            docstring_style: numpy
            merge_init_into_class: true
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            inherited_members: true
            heading_level: 2

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Security: security.md
  - Containers: containers.md
  - Contributing: contributing.md
  - Style Guide: style-guide.md
  - API Reference:
      - Core Utilities: api/core.md
      - GUI Application: api/app.md
      - Version Bump Script: api/versioning.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mrhunsaker/3dmakeGUI
