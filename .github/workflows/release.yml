name: Build And Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag (for example: v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  build-linux:
    name: Build Linux Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build with PyInstaller
        run: uv run pyinstaller 3dmake_gui.spec

      - name: Package linux artifact
        run: tar -czf 3dmake-gui.tar.gz -C dist 3dmake-gui

      - name: Upload linux archive
        uses: actions/upload-artifact@v4
        with:
          name: linux-archive
          path: 3dmake-gui.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows Artifact
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build with PyInstaller
        run: uv run pyinstaller 3dmake_gui.spec

      - name: Package windows artifact
        shell: pwsh
        run: Compress-Archive -Path dist/3dmake-gui -DestinationPath 3dmake-gui.zip -Force

      - name: Upload windows archive
        uses: actions/upload-artifact@v4
        with:
          name: windows-archive
          path: 3dmake-gui.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]

    steps:
      - name: Download linux archive
        uses: actions/download-artifact@v4
        with:
          name: linux-archive
          path: release-assets

      - name: Download windows archive
        uses: actions/download-artifact@v4
        with:
          name: windows-archive
          path: release-assets

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Release ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
