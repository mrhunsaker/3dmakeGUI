# podman-compose file for 3dmake-gui-wrapper
# Requires: podman-compose >= 1.0 (pip install podman-compose)
# Usage:
#   podman build -t 3dmake-gui-wrapper:2026.04.29 .
#   podman-compose up            # start (builds if needed)
#   podman-compose up -d         # start in background
#   podman-compose down          # stop and remove containers
#
# The NiceGUI UI is served at http://localhost:8080

version: "3.8"

services:
  3dmake-gui:
    image: 3dmake-gui-wrapper:2026.04.29
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 3dmake-gui
    restart: unless-stopped

    # Bind only to localhost to avoid unintended network exposure.
    ports:
      - "127.0.0.1:8080:8080"

    environment:
      - NICEGUI_HOST=0.0.0.0
      - NICEGUI_PORT=8080
      - NICEGUI_RELOAD=false

    volumes:
      # Persist user settings and generated files.
      # Replace with host paths to work on local files, e.g.:
      #   - /home/youruser/projects:/home/appuser/projects
      - projects:/home/appuser/projects
      - settings:/home/appuser/.config/3dmake-gui

    # Podman-specific security options
    security_opt:
      - no-new-privileges:true
      # Uncomment to run with the default rootless seccomp profile:
      # - seccomp=unconfined

    # Run as non-root (UID/GID 1001 must exist in the image)
    user: "1001:1001"

    cap_drop:
      - ALL

    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /run:mode=755

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  projects:
  settings:
